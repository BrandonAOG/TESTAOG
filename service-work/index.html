<script>
(function() {
  var saved = '';
  try { saved = localStorage.getItem('aog_theme_preference') || ''; } catch(e) {}
  var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  var isDark = saved === 'dark' || (!saved && prefersDark);
  if (isDark) document.documentElement.classList.add('dark-mode-pending');
})();
</script>

<script>
(function() {
  var ua = navigator.userAgent;
  var isCriOS    = /CriOS/.test(ua);
  var isIOS      = /iP(hone|od|ad)/.test(ua) && /WebKit/.test(ua) && !isCriOS;
  var isIPad     = /iPad/.test(ua) || (/Macintosh/.test(ua) && /Safari/.test(ua) && !(/Chrome/.test(ua)) && navigator.maxTouchPoints > 1);
  var isMacOS    = /Macintosh/.test(ua) && /Safari/.test(ua) && !/Chrome/.test(ua) && navigator.maxTouchPoints === 0;
  var isWindows  = /Windows/.test(ua);
  var isAndroid  = /Android/.test(ua);
  var isMobileChrome = isCriOS || (isAndroid && /Chrome/.test(ua) && !/Edg/.test(ua));
  function addClasses(el, list) { list.forEach(function(c){ if(c) el.classList.add(c); }); }
  var html = document.documentElement;
  if (isIOS || isIPad) addClasses(html, ['ios','mobile-safari']);
  if (isIPad)          html.classList.add('ipad-safari');
  if (isMacOS)         html.classList.add('macos');
  if (isWindows)       html.classList.add('windows');
  if (isAndroid)       html.classList.add('android');
  if (isMobileChrome)  html.classList.add('mobile-chrome');
  function applyToBody() {
    var b = document.body;
    if (isIOS || isIPad) addClasses(b, ['ios','mobile-safari']);
    if (isIPad)          b.classList.add('ipad-safari');
    if (isMacOS)         b.classList.add('macos');
    if (isWindows)       b.classList.add('windows');
    if (isAndroid)       b.classList.add('android');
    if (isMobileChrome)  b.classList.add('mobile-chrome');
  }
  if (document.body) applyToBody();
  else document.addEventListener('DOMContentLoaded', applyToBody);
})();
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg3); color: var(--text); min-height: 100vh; -webkit-text-size-adjust: 100%; }

/* ── ACTION BAR ── */
.action-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  background: #fff; border-bottom: 1px solid var(--border-bright);
  padding: 4px 8px; padding-top: max(4px, env(safe-area-inset-top, 4px));
  display: flex; gap: 4px; align-items: center; flex-wrap: nowrap;
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
/* Center the buttons when they fit; auto-margins collapse safely when the
   bar overflows and scrolls, so nothing gets clipped off the left edge. */
.action-bar > :first-child { margin-left: auto; }
.action-bar > :last-child { margin-right: auto; }
.ab-btn {
  padding: 6px 8px; font-size: 10px; font-weight: bold; letter-spacing: 0.5px;
  border: 1px solid rgba(217,119,6,0.4); background: rgba(217,119,6,0.05);
  cursor: pointer; color: var(--cyan); text-transform: uppercase;
  font-family: var(--font-display); white-space: nowrap; flex: 1;
  text-align: center; text-decoration: none; display: inline-flex;
  align-items: center; justify-content: center;
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  -webkit-tap-highlight-color: transparent;
}
.ab-btn:hover { border-color: var(--cyan); }

body.offline { padding-top: 0; }

/* ── WRAPPER ── */
.wrapper { padding-top: 54px; padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }

/* ── PAGE ── */
.page { width: 100%; max-width: 820px; background: #fff; border: 1.5px solid var(--cyan); box-shadow: 0 2px 12px rgba(217,119,6,0.1); padding: var(--pd-phone-page); position: relative; }

/* ── HEADER ── */
.page-header { display: flex; align-items: flex-start; gap: 12px; border-bottom: 1.5px solid var(--cyan); padding: var(--pd-phone-header); margin-bottom: 10px; }
.logo-img { width: 52px; height: 52px; object-fit: contain; flex-shrink: 0; }
.header-right { flex: 1; }
.company-name { font-family: var(--font-display); font-size: var(--fs-phone-company); color: var(--cyan); letter-spacing: 2px; font-weight: 700; line-height: 1.2; word-break: break-word; }
.doc-title { font-family: var(--font-display); font-size: var(--fs-phone-title); color: var(--text); letter-spacing: 1px; font-weight: 500; margin-top: 2px; }

/* ── EMERGENCY ROW ── */
.emergency-row {
  display: flex; align-items: center; gap: 8px;
  border: 1.5px solid var(--border-bright); padding: 6px 10px;
  margin-bottom: 10px; border-radius: 2px;
}
.emergency-cb {
  width: var(--h-phone-emergency); height: var(--h-phone-emergency);
  min-width: var(--h-phone-emergency); min-height: var(--h-phone-emergency);
  accent-color: var(--cyan); cursor: pointer; flex-shrink: 0;
}
.emergency-label {
  font-family: var(--font-display); font-size: var(--fs-phone-emergency);
  color: var(--text); letter-spacing: 1px; font-weight: 600; text-transform: uppercase;
}
.control-wrap { margin-left: auto; display: flex; align-items: center; gap: 6px; flex-shrink: 0; min-width: 0; }
.control-label { font-family: var(--font-display); font-size: var(--fs-phone-info-label); color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.control-input { border: none; border-bottom: 1.5px solid rgba(217,119,6,0.4); font-family: var(--font-mono); font-size: var(--fs-phone-info-input); color: var(--text); background: transparent; outline: none; min-height: var(--h-phone-info-input); padding: var(--pd-phone-info-input); width: 120px; }

/* ── INFO GRID ── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-bottom: 10px; }
.info-row { display: flex; align-items: flex-end; gap: 4px; }
.info-row.full { grid-column: 1 / -1; }
.info-label { font-family: var(--font-display); font-size: var(--fs-phone-info-label); color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
.info-input { flex: 1; min-width: 0; border: none; border-bottom: 1.5px solid rgba(217,119,6,0.4); font-family: var(--font-mono); font-size: var(--fs-phone-info-input); color: var(--text); background: transparent; outline: none; min-height: var(--h-phone-info-input); padding: var(--pd-phone-info-input); }
.info-input.short { max-width: 80px; flex: none; }

/* ── FIELD BLOCKS (Issue / Found / Fixed / Materials) ── */
.field-block { margin-bottom: 8px; }
.field-label {
  font-family: var(--font-display); font-size: var(--fs-phone-field-label);
  color: var(--cyan); letter-spacing: 2px; font-weight: 700;
  text-transform: uppercase; padding: 2px 0; margin-bottom: 3px;
  border-left: 3px solid var(--cyan); padding-left: 8px;
}
.field-textarea {
  width: 100%; height: var(--h-phone-field); min-height: var(--h-phone-field); max-height: var(--h-phone-field);

<script>
// ── AUTO-SAVE DRAFT ──
var DRAFT_KEY = 'aog_service_work_draft';
function saveDraft() {
  var data = {};
  document.querySelectorAll('input').forEach(function(el) {
    var key = el.id || el.name;
    if (!key) return;
    if (el.type === 'checkbox') {
      data[key] = el.checked;
    } else {
      if (data[key] === undefined) data[key] = el.value;
    }
  });
  document.querySelectorAll('textarea').forEach(function(el) {
    var key = el.id || el.name;
    if (key) data[key] = el.value;
  });
  try { localStorage.setItem(DRAFT_KEY, JSON.stringify(data)); } catch(e) {}
}
function restoreDraft() {
  var saved = '';
  try { saved = localStorage.getItem(DRAFT_KEY) || ''; } catch(e) {}
  if (!saved) return;
  try {
    var data = JSON.parse(saved);
    document.querySelectorAll('input').forEach(function(el) {
      var key = el.id || el.name;
      if (!key || data[key] === undefined) return;
      if (el.type === 'checkbox') { el.checked = !!data[key]; }
      else { el.value = data[key]; }
    });
    document.querySelectorAll('textarea').forEach(function(el) {
      var key = el.id || el.name;
      if (key && data[key] !== undefined) el.value = data[key];
    });
  } catch(e) {}
}
setInterval(saveDraft, 30000);
document.addEventListener('change', saveDraft);
document.addEventListener('input', saveDraft);

// ── CLEAR ──
function clearForm() {
  if (!confirm('Clear all fields?')) return;
  document.querySelectorAll('input[type="text"],input[type="time"]').forEach(function(el){ el.value=''; });
  document.querySelectorAll('input[type="checkbox"]').forEach(function(el){ el.checked=false; });
  document.querySelectorAll('textarea').forEach(function(el){ el.value=''; });
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('svc_date').value = today;
  try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
}

// ── BEFORE/AFTER PRINT ──
window.addEventListener('beforeprint', function() {
  document.body.classList.remove('dark-mode');
  document.documentElement.classList.remove('dark-mode-pending');
  document.documentElement.style.colorScheme = 'light';
  document.body.style.colorScheme = 'light';
  var ds = document.getElementById('dark-mode-style');
  if (ds) ds.disabled = true;
});
window.addEventListener('afterprint', function() {
  document.documentElement.style.colorScheme = '';
  document.body.style.colorScheme = '';
  var ds = document.getElementById('dark-mode-style');
  if (ds) ds.disabled = false;
});

// ── PRINT ──
function printForm() {
  var isMobileSafari = document.body.classList.contains('mobile-safari');
  var wasDark        = document.body.classList.contains('dark-mode');

  var prevTitle = document.title;
  var cName = (document.getElementById('cust_name').value||'').trim();
  document.title = (cName ? cName + ' - ' : '') + 'Service Work';

  document.body.classList.remove('dark-mode');
  document.documentElement.classList.remove('dark-mode-pending');
  document.documentElement.style.colorScheme = 'light';
  document.body.style.colorScheme = 'light';
  var _darkStyleEl = document.getElementById('dark-mode-style');
  if (_darkStyleEl) _darkStyleEl.disabled = true;

  var compName  = document.querySelector('.company-name');
  var docTitle  = document.querySelector('.doc-title');
  var footerEls = document.querySelectorAll('.footer-text');
  if (compName) compName.setAttribute('style', 'color:#D97706!important;text-shadow:none!important;');
  if (docTitle) docTitle.setAttribute('style', 'color:#1F2937!important;text-shadow:none!important;');
  footerEls.forEach(function(el){ el.setAttribute('style','color:#9CA3AF!important;text-shadow:none!important;'); });

  if (wasDark) {
    var printStyle = document.createElement('style');
    printStyle.id  = 'force-print-light';
    printStyle.textContent = [
      ':root, html, body { color-scheme: light !important; }',
      'body { --cyan:#D97706!important; --bg:#FFFFFF!important; --text:#1F2937!important; --text-muted:#6B7280!important; }',
      '@media print {',
      '  *, *::before, *::after { background:white!important;color:#1F2937!important;box-shadow:none!important;text-shadow:none!important;border-color:rgba(217,119,6,0.4)!important; }',
      '  .company-name { color:#D97706!important; }',
      '  .field-label  { color:#D97706!important; }',
      '  .footer-text,.page-num { color:#9CA3AF!important; }',
      '  .page { border:1.5pt solid #D97706!important; }',
      '}'
    ].join('\n');
    document.head.appendChild(printStyle);
  }

  var vp = document.querySelector('meta[name="viewport"]');

  function restore() {
    document.title = prevTitle;
    var f  = document.getElementById('safari-print-fix');  if(f)  f.remove();
    var pl = document.getElementById('force-print-light'); if(pl) pl.remove();
    document.documentElement.style.colorScheme = '';
    document.body.style.colorScheme = '';
    if (_darkStyleEl) _darkStyleEl.disabled = false;
    if (wasDark) { document.body.classList.add('dark-mode'); document.documentElement.setAttribute('data-theme','dark'); }
    else { document.body.classList.remove('dark-mode'); document.documentElement.setAttribute('data-theme','light'); }
    if (compName) compName.removeAttribute('style');
    if (docTitle) docTitle.removeAttribute('style');
    footerEls.forEach(function(el){ el.removeAttribute('style'); });
  }

  if (isMobileSafari && vp) {
    var fix = document.createElement('style');
    fix.id = 'safari-print-fix';
    fix.textContent = [
      '@page { size:8.5in 11in; margin:0.15in; }',
      '@page:blank { display:none; }',
      '@media print {',
      '  * { animation:none!important; transition:none!important; }',
      '  html, body { height:auto!important; overflow:visible!important; }',
      '  .wrapper { height:auto!important; }',
      '  #page1 { page-break-after:auto!important; break-after:auto!important; }',
      '  html { width:820px!important; }',
      '  body { width:820px!important; transform-origin:top left!important; }',
      '  .wrapper { display:block!important; padding:0!important; gap:0!important; }',
      '  .page { display:block!important; width:100%!important; max-width:none!important;',

      '    padding:var(--pd-print-ipad-page)!important;',
      '    border:1.5pt solid #D97706!important; box-shadow:none!important;',
      '    margin:0!important; position:static!important; overflow:visible!important; }',

      '  .company-name    { font-size:var(--fs-print-ipad-company)!important; color:#D97706!important; }',
      '  .doc-title       { font-size:var(--fs-print-ipad-title)!important; color:#1F2937!important; }',
      '  .info-label      { font-size:var(--fs-print-ipad-info-label)!important; }',
      '  .info-input      { font-size:var(--fs-print-ipad-info-input)!important; min-height:var(--h-print-ipad-info-input)!important; padding:var(--pd-print-ipad-info-input)!important; }',
      '  .control-input   { font-size:var(--fs-print-ipad-info-input)!important; }',
      '  .field-label     { font-size:var(--fs-print-ipad-field-label)!important; color:#D97706!important; }',
      '  .field-textarea  { font-size:var(--fs-print-ipad-field-input)!important; min-height:var(--h-print-ipad-field)!important; padding:var(--pd-print-ipad-field)!important; }',
      '  .field-textarea::placeholder { color:transparent!important; opacity:0!important; }',
      '  .emergency-label { font-size:var(--fs-print-ipad-emergency)!important; }',
      '  .footer-text     { font-size:var(--fs-print-ipad-footer)!important; color:#9CA3AF!important; }',
      '  .page-footer     { padding:var(--pd-print-ipad-footer)!important; }',
      '  .action-bar,#save-status,#offline-banner { display:none!important; }',
      '}'
    ].join('\n');

    void document.getElementById('page1').getBoundingClientRect();
    document.head.appendChild(fix);

    requestAnimationFrame(function() {
      window.print();
    });

    var _restored = false;
    function _tryRestore() {
      if (_restored) return;
      _restored = true;
      document.removeEventListener('visibilitychange', _visHandler);
      window.removeEventListener('focus', _focusHandler);
      restore();
    }
    function _visHandler() {
      if (document.hidden) { _wentHidden = true; }
      else if (_wentHidden) { _tryRestore(); }
    }
    var _wentHidden = false;
    document.addEventListener('visibilitychange', _visHandler);
    function _focusHandler() { if (_wentHidden) _tryRestore(); }
    window.addEventListener('focus', _focusHandler);
    window.addEventListener('pageshow', function _psHandler() {
      window.removeEventListener('pageshow', _psHandler);
      setTimeout(function() { _tryRestore(); }, 300);
    });
    setTimeout(function() { _tryRestore(); }, 2000);

  } else {
    window.addEventListener('afterprint', restore);
    window.print();
  }
}

// ── OFFLINE ──
window.addEventListener('online',  function() { document.body.classList.remove('offline'); });
window.addEventListener('offline', function() { document.body.classList.add('offline'); });

// ── THEME ──
var THEME_KEY = 'aog_theme_preference';
function applyTheme(theme) {
  var isDark = theme === 'dark';
  if (isDark) { document.body.classList.add('dark-mode'); document.documentElement.setAttribute('data-theme','dark'); }
  else { document.body.classList.remove('dark-mode'); document.documentElement.setAttribute('data-theme','light'); }
  document.documentElement.classList.remove('dark-mode-pending');
  try { localStorage.setItem(THEME_KEY, theme); } catch(e) {}
}
function toggleTheme() { applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark'); }
function getInitialTheme() {
  var saved = ''; try { saved = localStorage.getItem(THEME_KEY) || ''; } catch(e) {}
  if (saved) return saved;
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function() {
  var today = new Date().toISOString().split('T')[0];
  if (!navigator.onLine) { document.body.classList.add('offline'); }
  applyTheme(getInitialTheme());
  if (document.documentElement.classList.contains('dark-mode-pending')) { document.body.classList.add('dark-mode'); }
  restoreDraft();
  if (!document.getElementById('svc_date').value) document.getElementById('svc_date').value = today;
});
</script>
